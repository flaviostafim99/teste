<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aventura no Catelo</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1 id="titulo">Aventura no Castelo</h1>
            <p id="historia">Você é um aventureiro que busca encontrar o tesouro escondido no castelo. Você esta na entrada do castelo. </p>
            <div class="opcoes">
                <button id="opcao1" onclick="escolherOpcao(1)">entrar no castelo</button>
                <button id="opcao2" onclick="escolherOpcao(2)">Explorar o jardim</button>
                <button id="opcao3" onclick="escolherOpcao(3)">sequir em frente</button>
            </div>
        </div>


        <script>
            let historia = [
        {
            titulo: "Aventura no Castelo",
            texto:"Você é um aventureiro que busca encontrar o tesouro escondido no castelo. Você esta na entrada do castelo.",
            opcoes: [
        {texto:"Entrar no castelo",proximo:1},
        {texto:"Explorar o jardim",proximo:2}
            ]
        },
        {
            titulo:"Dentro do castelo",
            texto:"Você entra no castelo e encontra um coredor escuro.",
            opcoes:[
                {texto:"sequir em frente",proximo:3 },
                {texto:"voltar para entrada",proximo:0}
            ]
        },
        {
            titulo:"jardim do castelo",
            texto:"Você explora o jardim e encontra uma fonte", proximo:4,
            opcoes:[
                {texto:"Beber da fonte", proximo:4},
                {texto:"Voltar para a entrada",proximo:0}
            ]
        },
        //add mais historia aq
            ];
            let indiceAtual = 0;


            function escolherOpcao (opcao){
                let historiaAtual = historia[indiceAtual];
                let opcaoEscolhida = historiaAtual.opcoes[opcao-1];
                indiceAtual = opcaoEscolhid.proximo;
                atualizarHistoria();
            }


            function atualizarHistoria(){
                let historiaAtual = historia[indiceAtual];
                document.getElementebyld("titulo").innerText = historiaAtual.titulo;
                document.getElementsByld("historia").innerText = historiaAtual.texto;
                let opcoesHtml = "";
                for (let i = 0; i <historiaAtual.opcoes.length; i++){
                    opcoesHtml += <button id="opcao${i + 1}" onclick= "escolherOpcao(${i + 1})">${historiaAtual.opcoes[i].texto}</button>;
                }
                document.querySelector(".opcoes").innerHTML = opcoesHtml;
            }


            atualizarHistoria();
        </script>
    </body>
</html>
